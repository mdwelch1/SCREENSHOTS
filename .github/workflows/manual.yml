 # amazon-screenshot-automation
 
-Automation script to capture full-page Amazon promotion screenshots across marketplaces, languages, pages, and device profiles.
+Automation script to capture full-page Amazon promotion screenshots across marketplaces, pages, languages, and device profiles.
 
 ## What it captures
 
 For each configured marketplace, the script captures:
 - Homepage (`/`)
 - Event page (`/springdealdays`)
 
-For each page it runs across detected available languages and these device profiles:
-- Desktop: `1920x1080`
-- Mobile: iPhone 14 Pro (`393x852`)
+For each page it:
+- Detects all available languages from Amazon's language selector (with fallback defaults per marketplace)
+- Captures each language variant
+- Runs across these device profiles:
+  - Desktop: `1920x1080`
+  - Mobile: iPhone 14 Pro (`393x852`)
 
+## Procedure implemented
+
+For each marketplace × page × language × device combination, the script:
+1. Navigates to the URL.
+2. Attempts to accept cookie banners.
+3. Waits for page load and an additional 5 seconds for modules to render.
+4. Scrolls from top to bottom, then back to top.
+5. Captures a full-page screenshot.
+6. If page content appears blank, goes back and retries the page load.
+7. Retries once on failure.
 
 ## Output
 
 The run produces:
 - Screenshots under `amazon-promotions/<COUNTRY>/<homepage|event>/...png`
 - Metadata at `amazon-promotions/metadata.json`
 - Execution log at `amazon-promotions/execution.log`
+
+Screenshot filename format:
+`amazon_{market}_{language}_{page}_{device}_{viewport_or_device}_{date}.png`
