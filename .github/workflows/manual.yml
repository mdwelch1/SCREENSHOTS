name: Manual Automation

on:
  workflow_dispatch:

jobs:
  validate:
    name: Validate prompt file
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      REF: ${{ github.sha }}
      FILE_PATH: amazon_screenshot_automation_prompt.md
    steps:
      - name: Show selected run context
        run: |
          echo "Running manual workflow"
          echo "Repository: ${REPO}"
          echo "Ref: ${REF}"

      - name: Verify automation prompt exists via GitHub API
        run: |
          set -euo pipefail
          url="https://api.github.com/repos/${REPO}/contents/${FILE_PATH}?ref=${REF}"
          status=$(curl -sS -o /tmp/file.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$url")

          if [ "$status" != "200" ]; then
            echo "Expected ${FILE_PATH} at ref ${REF}, got HTTP ${status}" >&2
            cat /tmp/file.json >&2 || true
            exit 1
          fi

          echo "Prompt file found"
