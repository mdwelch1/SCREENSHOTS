name: Manual Automation

on:
  workflow_dispatch:
    inputs:
      target:
        description: What to run
        required: false
        default: validate

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Validate prompt file
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout repository
        uses: actions/checkout@v5

      - id: show_target
        name: Show selected target
        run: |
          echo "Running manual workflow"
          echo "Target: ${{ inputs.target }}"

      - id: verify_prompt
        name: Verify automation prompt exists
        run: |
          test -f amazon_screenshot_automation_prompt.md
          echo "Prompt file found"
