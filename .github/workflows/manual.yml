name: Manual Automation

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to run"
        required: false
        default: "validate"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show selected target
        run: |
          echo "Running manual workflow"
          echo "Target: ${{ github.event.inputs.target }}"

      - name: Verify automation prompt exists
        run: test -f amazon_screenshot_automation_prompt.md
